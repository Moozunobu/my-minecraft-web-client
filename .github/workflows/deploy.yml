name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # バージョン不整合を無視し、存在しないパッケージのエラーを回避する設定
        run: npm install --legacy-peer-deps || npm install --legacy-peer-deps --force
        
      - name: Build
        # ビルドを強制実行
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096" # メモリ不足対策

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages