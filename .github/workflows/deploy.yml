name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Remove pnpm lockfile to avoid frozen install issues
        run: |
          find . -name "pnpm-lock.yaml" -not -path "*/node_modules/*" -exec rm -f {} \;

      - name: Remove patchedDependencies from package.json (pnpm v8 compat)
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (pkg.pnpm) {
              delete pkg.pnpm.patchedDependencies;
              delete pkg.pnpm.updateConfig;
              delete pkg.pnpm.allowUnusedPatches;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json cleaned');
          "

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install tsx
        run: pnpm add -g tsx

      - name: Build
        run: |
          pnpm run build
          touch dist/.nojekyll
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          PUBLIC_URL: /${{ github.event.repository.name }}/

      - name: Verify critical files exist
        run: |
          echo "Checking critical build artifacts..."
          ls -la dist/coi-serviceworker.min.js || echo "WARNING: coi-serviceworker.min.js missing!"
          ls -la dist/mesherWasm.js || echo "WARNING: mesherWasm.js missing!"
          ls -la dist/mesher.js || echo "WARNING: mesher.js missing!"
          ls -la dist/wasm_mesher_bg.wasm || echo "WARNING: wasm_mesher_bg.wasm missing!"
          echo "Checking mesherWasm.js patch..."
          grep -c 'self.location' dist/mesherWasm.js && echo "PATCH APPLIED: n1e.url fix present" || echo "WARNING: PATCH NOT APPLIED"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages