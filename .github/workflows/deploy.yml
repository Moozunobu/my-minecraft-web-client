name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Hard delete patches config and lockfiles
        run: |
          find . -name "pnpm-lock.yaml" -not -path "*/node_modules/*" -exec rm -f {} \;
          find . -name "package.json" -not -path "*/node_modules/*" -exec sed -i '/"patchedDependencies":/,/}/d' {} \;
          find . -name "package.json" -not -path "*/node_modules/*" -exec sed -i '/"patchedDependencies":/d' {} \;

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install tsx
        # ビルドスクリプトの実行に不足している tsx コマンドをグローバルに補充します
        run: pnpm add -g tsx

      - name: Build
        run: |
          pnpm run build
          touch dist/.nojekyll
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          PUBLIC_URL: /${{ github.event.repository.name }}/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages