name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Disable patches and remove lockfiles
        # 1. 不整合を防ぐために既存のロックファイルを削除
        # 2. .npmrc に「パッチを一切適用しない」という pnpm 固有の強力な設定を強制注入
        run: |
          find . -name "pnpm-lock.yaml" -not -path "*/node_modules/*" -exec rm -f {} \;
          echo "patched-dependencies=" >> .npmrc
          echo "side-effects-cache=false" >> .npmrc

      - name: Install dependencies
        # ワークスペース構成（minecraft-data等）を維持したまま、パッチを無視してクリーンインストールします
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages